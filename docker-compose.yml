version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vedic_astrology
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: astro_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d vedic_astrology"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://astro:astro_secret@postgres:5432/vedic_astrology
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://astro:astro_secret@postgres:5432/vedic_astrology
      NEXT_PUBLIC_API_URL: http://localhost:8000
      AUTH_SECRET: dev-secret-change-in-prod
    depends_on:
      - postgres
      - backend

volumes:
  postgres_data:
